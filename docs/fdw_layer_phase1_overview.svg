  <text
     class="mono"
     x="727.80121"
     y="494"
     id="text27">EndForeignScan</text>
  <text
     class="small"
     x="727.80121"
     y="514"
     id="text28">释放 Reader 与内存</text>
  <text
     class="small"
     x="727.80121"
     y="539"
