  <text
     class="mono"
     x="117.80123"
     y="384"
     id="text13">GetForeignRelSize</text>
  <text
     class="small"
     x="117.80123"
     y="404"
     id="text14">估行：total_records × 选择率</text>
  <text
     class="mono"
     x="117.80123"
     y="429"
     id="text15">GetForeignPaths</text>
  <text
     class="small"
     x="117.80123"
     y="449"
     id="text16">全表路径（多路径预留）</text>
  <text
     class="mono"
     x="117.80123"
     y="474"
     id="text17">GetForeignPlan</text>
  <text
     class="small"
     x="117.80123"
     y="494"
