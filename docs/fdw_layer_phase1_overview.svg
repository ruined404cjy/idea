  <text
     class="title"
     x="73.801231"
     y="44"
     id="text2">openGauss Iceberg FDW 层（第一阶段）：模块与上下游接口</text>
  <text
     class="subtitle"
     x="73.801231"
     y="72"
     id="text3">只读全表扫描：规划 / 执行两阶段经 fdw_private 衔接，与优化器、Catalog、Reader / SDK 的接口与参数标于箭头。</text>
  <!-- ① 优化器 -->
  <rect
     class="panel"
     x="73.788742"
     y="89.987511"
     width="1353.1965"
     height="98.024979"
     rx="11.699105"
     id="rect3" />
  <rect
     x="73.801231"
     y="90"
     width="8"
     height="98"
     rx="4"
     fill="#1f2937"
     id="rect4" />
  <text
     class="h1"
     x="101.80123"
     y="124"
     id="text4">① 优化器（查询规划期）</text>
  <text
     class="monoq"
     x="101.80123"
     y="160"
     id="text5">SELECT id, payload FROM items WHERE category = 3 AND price &lt; 500;</text>
  <text
     class="small"
     x="857.80121"
     y="120"
     id="text6">优化器把外表的计划结构传入 FDW 规划回调：</text>
  <text
     class="small"
     x="857.80121"
     y="146"
     id="text7">RelOptInfo（baserel：RestrictInfo、reltarget）</text>
  <text
     class="small"
     x="857.80121"
     y="172"
     id="text8">与 scan_clauses。</text>
  <line
     class="line"
     x1="317.80124"
     y1="188"
     x2="317.80124"
     y2="250"
     marker-end="url(#arw)"
     id="line8" />
  <text
     class="lbl"
     x="329.80124"
     y="228"
     id="text9">RelOptInfo、 scan_clauses</text>
