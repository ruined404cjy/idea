<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .panel-soft { fill: #f8fbff; stroke: #64748b; stroke-width: 2; }
      .fdw { fill: #f6faff; stroke: #2563eb; stroke-width: 3; }
      .subpanel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; }
      .subpanel-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .subpanel-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .subpanel-orange { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .subpanel-idx { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; }
      .line { fill: none; stroke: #475569; stroke-width: 2.2; }
      .dash { fill: none; stroke: #9333ea; stroke-width: 2.2; stroke-dasharray: 8 7; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 16px; fill: #475569; }
      .h1 { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
      .h2 { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #1e293b; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 14px; fill: #1e293b; }
      .tiny { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 12.5px; fill: #64748b; }
      .mono { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; font-size: 15px; fill: #0f172a; }
      .mono-s { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; font-size: 13px; fill: #1d4ed8; }
      .mono-p { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; font-size: 13px; fill: #9333ea; }
      .mono-g { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; font-size: 12.5px; fill: #334155; }
      .blue { fill: #2563eb; }
      .green { fill: #16a34a; }
      .orange { fill: #ea580c; }
      .purple { fill: #9333ea; }
      .muted { fill: #64748b; }
      .chip { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1150"/>

  <text class="title" x="60" y="46">openGauss Iceberg FDW 层：内部结构与上下游接口</text>
  <text class="subtitle" x="60" y="74">覆盖查询计划接入、谓词与列下推、执行取数到回表物化的完整路径，以及上游 Catalog、下游 Reader、分区向量索引三处边界。</text>

  <!-- ===================== ① 查询接入与计划生成 ===================== -->
  <rect class="panel" x="60" y="96" width="1680" height="150" rx="12"/>
  <rect x="60" y="96" width="8" height="150" rx="4" fill="#1f2937"/>
  <text class="h1" x="92" y="132">① 查询输入与接入</text>
  <text class="mono" x="92" y="168">SELECT _row_id, payload FROM items WHERE category = 3 AND price &lt; 500</text>
  <text class="mono" x="92" y="196">ORDER BY emb &lt;-&gt; :q LIMIT 10;</text>
  <text class="tiny" x="430" y="196">（topk 形态 = 阶段三）</text>
  <text class="tiny muted" x="92" y="226">内核 parser + analyzer 解析为查询树后，优化器接入 FDW 回调。</text>

  <line x1="880" y1="112" x2="880" y2="230" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="h2" x="906" y="128">FDW 回调入参 → 解析出 query spec</text>
  <text class="small" x="906" y="152">baserel(含 RestrictInfo) 入 GetForeignRelSize/Paths/Plan；tlist / scan_clauses 仅入 GetForeignPlan。</text>
  <text class="small" x="906" y="180">pred = { category=3, price&lt;500 }   ｜   projection = { _row_id, payload, emb }</text>
  <text class="small purple" x="906" y="206">partition mask  ←  分区谓词 + Catalog partition spec</text>
  <text class="small purple" x="906" y="232">阶段三 topk：S=S2 (index snapshot) · Q=:q · k=10 · k'=over-fetch · metric</text>

  <!-- ===================== ② FDW 主体（大块） ===================== -->
  <rect class="fdw" x="60" y="262" width="1380" height="500" rx="16"/>
  <text class="h1" x="84" y="300">② FDW 层（本组负责）</text>
  <text class="small" x="84" y="326">职责：接入 openGauss 优化器与执行器 · 谓词 / 列下推 · 类型转换 · 内存管理 · 规划 → 执行私有数据传递 · 回表物化。</text>

  <!-- 规划期回调 -->
  <rect class="subpanel-blue" x="84" y="346" width="430" height="216" rx="10"/>
  <text class="h2" x="104" y="376">规划期回调（计划生成）</text>
  <text class="mono-s" x="104" y="402">GetForeignRelSize</text>
  <text class="small" x="104" y="421">估行：snapshot 基数 × 选择率</text>
  <text class="mono-s" x="104" y="447">GetForeignPaths</text>
  <text class="small" x="104" y="466">登记全表路径 + <tspan class="purple">索引扫描路径</tspan></text>
  <text class="mono-s" x="104" y="492">GetForeignPlan</text>
  <text class="small" x="104" y="511">拆谓词(remote/local) · 列裁剪 · 解析 Catalog</text>
  <text class="mono-s" x="104" y="537">make_foreignscan</text>
  <text class="small" x="104" y="556">产出 ForeignScan 节点 + fdw_private</text>

  <!-- 执行期回调 -->
  <rect class="subpanel-green" x="534" y="346" width="430" height="216" rx="10"/>
  <text class="h2" x="554" y="376">执行期回调（取数 · 回表）</text>
  <text class="mono-s" x="554" y="402">BeginForeignScan</text>
  <text class="small" x="554" y="421">解码 fdw_private · 建状态 · 开 Reader</text>
  <text class="mono-s" x="554" y="447">IterateForeignScan</text>
  <text class="small" x="554" y="466">Arrow → HeapTuple 逐行返回 Slot</text>
  <text class="mono-p" x="554" y="492">VecIterateForeignScan</text>
  <text class="small purple" x="554" y="511">Arrow 列批 → VectorBatch</text>
  <text class="mono-s" x="554" y="537">ReScan / End / Explain</text>
  <text class="small" x="554" y="556">重开游标 · 释放 reader/内存 · 计划展示</text>

  <!-- fdw_private 契约 -->
  <rect class="subpanel" x="984" y="346" width="432" height="216" rx="10"/>
  <text class="h2" x="1004" y="376">规划 → 执行：fdw_private（可序列化）</text>
  <text class="mono-s" x="1004" y="402">scanEntry</text>
  <text class="small" x="1004" y="421">metadata_location · snap / schema / spec id</text>
  <text class="mono-s" x="1004" y="447">projection / filter</text>
  <text class="small" x="1004" y="466">retrieved attno · remote / local quals</text>
  <text class="mono-p" x="1004" y="492">indexSpec</text>
  <text class="small purple" x="1004" y="511">S=S2 · Q · metric · k / k' · partition mask</text>
  <text class="mono-p" x="1004" y="537">locator</text>
  <text class="small purple" x="1004" y="556">_row_id 或 (file_path, position)</text>

  <!-- 谓词/分区/列下推 -->
  <rect class="subpanel-orange" x="84" y="582" width="640" height="160" rx="10"/>
  <text class="h2" x="104" y="612">谓词 / 分区 / 列下推</text>
  <text class="small purple" x="104" y="638">分区剪枝：partition mask ← manifest 分区 lower / upper</text>
  <text class="small" x="104" y="660">列统计：manifest 列 min / max（执行期施加）</text>
  <text class="small" x="104" y="682">行组：Parquet footer（Reader 内）；列裁剪 = 投影下推</text>
  <text class="small" x="104" y="704">可下推谓词编码进 pushedFilter；残差留节点 qual 由 ExecQual 施加</text>

  <!-- 回表/类型/运行时 -->
  <rect class="subpanel-orange" x="744" y="582" width="672" height="160" rx="10"/>
  <text class="h2" x="764" y="612">回表物化 · 类型转换 · 运行时</text>
  <text class="small" x="764" y="638">全表扫描：Arrow 列批 → 目标列物化为 HeapTuple</text>
  <text class="small purple" x="764" y="660">索引回表：locator → Reader 定位 → 取整行</text>
  <text class="small" x="764" y="682">类型转换：Arrow C Data → Datum / HeapTuple / VectorBatch</text>
  <text class="small" x="764" y="704">运行时：batch_cxt 每批回收 · temp_cxt 单行 · 变长/decimal 拷入 PG</text>

  <!-- ===================== ③ 上游 Catalog（右上，缩小） ===================== -->
  <rect class="panel-soft" x="1460" y="262" width="280" height="240" rx="12"/>
  <text class="h1" x="1484" y="298">③ 上游 Catalog（只读）</text>
  <text class="small" x="1484" y="322">FDW 规划期点查取用</text>
  <rect class="subpanel" x="1484" y="336" width="232" height="78" rx="8"/>
  <text class="h2" x="1500" y="360">tables</text>
  <text class="small" x="1500" y="382">metadata_location</text>
  <text class="small" x="1500" y="402">snapshot id · schema id</text>
  <rect class="subpanel" x="1484" y="424" width="232" height="62" rx="8"/>
  <text class="h2" x="1500" y="448">snapshots</text>
  <text class="small" x="1500" y="470">total_records · manifest_list</text>

  <!-- ===================== ④ 分区向量索引层（右中，缩小） ===================== -->
  <rect class="panel-soft" x="1460" y="522" width="280" height="240" rx="12"/>
  <text class="h1 purple" x="1484" y="558">④ 分区向量索引层</text>
  <text class="small" x="1484" y="582">其他成员实现 · FDW 依赖契约</text>
  <rect class="subpanel-idx" x="1484" y="596" width="232" height="68" rx="8"/>
  <text class="h2" x="1500" y="620">输入契约</text>
  <text class="small" x="1500" y="642">S=S2 · Q · metric · k · mask</text>
  <rect class="subpanel-idx" x="1484" y="674" width="232" height="74" rx="8"/>
  <text class="h2" x="1500" y="698">输出契约</text>
  <text class="small" x="1500" y="720">候选 _row_id 或 (file, pos)</text>
  <text class="small" x="1500" y="740">+ dist · delta 来源标记</text>

  <!-- ===================== ⑤ 下游 Reader / SDK（底部全宽，展开） ===================== -->
  <rect class="panel-soft" x="60" y="782" width="1680" height="290" rx="12"/>
  <text class="h1" x="84" y="820">⑤ 下游 Reader / SDK（FDW 取数后端）</text>
  <text class="small" x="84" y="846">职责：解析 Iceberg 元数据 · 规划并读数据文件 · 以 Arrow 列式批交付；FDW 经统一接口驱动并完成行 / 列转换。</text>

  <rect class="subpanel" x="84" y="866" width="380" height="186" rx="8"/>
  <text class="h2" x="104" y="894">顺序读取接口</text>
  <text class="mono-s" x="104" y="920">open / next / close</text>
  <text class="small" x="104" y="944">open：建扫描，返回 Arrow schema</text>
  <text class="small" x="104" y="966">next：逐批返回 Arrow 列批</text>
  <text class="small" x="104" y="988">close：释放扫描句柄</text>
  <text class="small" x="104" y="1018">FileScanTask 规划在此完成</text>

  <rect class="subpanel-idx" x="484" y="866" width="380" height="186" rx="8"/>
  <text class="h2 purple" x="504" y="894">位置读取接口</text>
  <text class="mono-p" x="504" y="920">read_by_locator(file, pos, cols)</text>
  <text class="small" x="504" y="944">据索引候选 locator 取整行</text>
  <text class="small" x="504" y="966">用于索引回表与 delta reconcile</text>
  <text class="small purple" x="504" y="988">阶段三启用 · 首期预留入口</text>

  <rect class="subpanel" x="884" y="866" width="832" height="186" rx="8"/>
  <text class="h2" x="904" y="894">FDW core 传入的输入 → 如何读对象存储</text>
  <text class="mono-g" x="904" y="922">scanEntry(metadata_location)</text>
  <text class="small" x="1190" y="922">→ metadata.json → manifest list → manifest → data file（PlanFiles）</text>
  <text class="mono-g" x="904" y="950">columns（投影列）</text>
  <text class="small" x="1190" y="950">→ 仅读选中列的 Parquet column chunk</text>
  <text class="mono-g" x="904" y="978">filter（pushedFilter）</text>
  <text class="small" x="1190" y="978">→ manifest 分区 / 列统计剪枝 + Parquet 行组跳过</text>
  <text class="mono-g" x="904" y="1006">storage_config（凭证）</text>
  <text class="small" x="1190" y="1006">→ S3 / OBS 鉴权访问；schema_json / delete file 做演进与 MOR</text>
  <text class="mono-p" x="904" y="1034">locator（阶段三）</text>
  <text class="small purple" x="1190" y="1034">→ 定位 (file, position) 直接读目标行</text>

  <!-- ===================== 边界接口连线 ===================== -->
  <line class="line" x1="400" y1="246" x2="400" y2="262"/>
  <text class="tiny" x="414" y="259">计划接入边界</text>

  <line class="line" x1="1440" y1="384" x2="1460" y2="384"/>
  <text class="tiny" x="1448" y="376">元数据接口</text>

  <line class="dash" x1="1440" y1="630" x2="1460" y2="630"/>
  <text class="tiny purple" x="1448" y="622">索引接口</text>

  <line class="line" x1="750" y1="762" x2="750" y2="782"/>
  <text class="tiny" x="764" y="778">Reader 接口：open / next / close · read_by_locator</text>

  <!-- 图例 -->
  <rect class="chip" x="60" y="1092" width="900" height="30" rx="15"/>
  <text class="tiny" x="80" y="1112">图例：蓝 = 规划期 · 绿 = 执行期 · 橙 = 下推与回表 · 紫 = 分区及阶段二/三（向量索引检索 · 位置回表 · delta 合并）相关接口与字段。</text>
</svg>
